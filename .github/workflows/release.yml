name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # .cargo/config.toml sets rustc-wrapper = "scripts/cargo-rustc-wrapper" for
  # local dev. The wrapper is a shell script: Windows runners cannot exec it
  # (os error 193) and the cross/aarch64 container cannot either, so clear
  # ambient wrappers and override Cargo's build.rustc-wrapper for all release
  # jobs (mirrors ci.yml).
  RUSTC_WRAPPER: ""
  CARGO_BUILD_RUSTC_WRAPPER: ""

jobs:
  frontend-assets:
    name: Frontend assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-gateway-admin
      - name: Upload gateway-admin export
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: frontend-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
            binary: labby
            archive: lab-x86_64-unknown-linux-gnu.tar.gz
          # aarch64-unknown-linux-gnu removed: rquickjs-sys (Code Mode QuickJS
          # bindings) fails to cross-compile in the cross container (clang
          # cannot find stdbool.h for the target). No fleet host is aarch64.
          # Tracked in beads (restore aarch64 release builds).
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use-cross: false
            binary: labby.exe
            archive: lab-x86_64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        uses: taiki-e/install-action@532bca59bd936483e3ece96e64da0d83ba0f744a

      - name: Build with cross
        if: matrix.use-cross == true
        run: cross build --workspace --all-features --locked --release --target ${{ matrix.target }}

      - name: Build natively
        if: matrix.use-cross != true
        run: cargo build --workspace --all-features --locked --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          tar -C dist -czf "${{ matrix.archive }}" "${{ matrix.binary }}"
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}" -Force
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive }}" | Out-File -FilePath "${{ matrix.archive }}.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lab-${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          if-no-files-found: error

  container:
    name: Container image
    needs: frontend-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build container image
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: config/Dockerfile
          push: false
          tags: lab:release-dry-run
      - name: Build and push container image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: config/Dockerfile
          push: true
          # The immutable, reproducible reference is the :<tag> (vX.Y.Z) image.
          # :latest is MUTABLE — it is retained only because docker-compose.prod.yml
          # defaults LAB_IMAGE to ghcr.io/jmagar/lab:latest. Prefer pinning to a
          # version tag (or digest) in any reproducibility-sensitive deployment.
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  incus-image:
    name: Incus image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: lab-x86_64-unknown-linux-gnu
      - name: Install distrobuilder
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y debootstrap gpg incus rsync shellcheck squashfs-tools uidmap
          sudo snap install distrobuilder --classic
          sudo incus admin init --minimal || true
      - name: Validate Incus image scripts and definition
        run: |
          set -euo pipefail
          sh -n scripts/incus-bootstrap.sh
          bash -n scripts/ci/build-incus-image.sh scripts/ci/smoke-incus-image.sh
          shellcheck scripts/incus-bootstrap.sh scripts/ci/build-incus-image.sh scripts/ci/smoke-incus-image.sh
          sudo distrobuilder validate config/incus/labby-image.yaml -o image.serial=ci
      - name: Build Incus image
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: scripts/ci/build-incus-image.sh "$RELEASE_REF_NAME" lab-x86_64-unknown-linux-gnu.tar.gz
      - name: Smoke test Incus image
        run: scripts/ci/smoke-incus-image.sh
        env:
          IMAGE_ALIAS: labby-incus-release-smoke
          SMOKE_CONTAINER_NAME: labby-incus-release-smoke
          SMOKE_BOOTSTRAP_CONTAINER_NAME: labby-incus-release-bootstrap-smoke
          SMOKE_PROFILE_NAME: labby-gateway-release-smoke
          SMOKE_BOOTSTRAP_PROFILE_NAME: labby-gateway-release-bootstrap-smoke
      - name: Upload Incus image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lab-incus-image
          path: |
            target/incus-image-dist/labby-incus-*.tar.xz
            target/incus-image-dist/labby-incus-*.tar.xz.sha256
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, container, incus-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: lab-*
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          files=(
            lab-*.tar.gz
            lab-*.tar.gz.sha256
            lab-*.zip
            lab-*.zip.sha256
            labby-incus-*.tar.xz
            labby-incus-*.tar.xz.sha256
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --generate-notes
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --generate-notes
          fi
