name: Sync marketplace-no-mcp

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-marketplace-no-mcp
  cancel-in-progress: false

jobs:
  sync:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main into marketplace-no-mcp
        id: merge
        run: |
          git fetch origin main marketplace-no-mcp
          {
            echo "old_no_mcp_sha=$(git rev-parse origin/marketplace-no-mcp)"
            echo "main_sha=$(git rev-parse origin/main)"
          } >> "$GITHUB_OUTPUT"
          git switch marketplace-no-mcp
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "marketplace-no-mcp already contains main; nothing to merge"
          else
            git merge --no-commit --no-ff origin/main || true
            git read-tree --reset -u origin/main
            git commit --no-edit
          fi
          echo "merged_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Apply no-MCP variant rules
        run: |
          python3 plugins/scripts/apply-no-mcp-marketplace
          plugins/scripts/check-no-mcp-drift --check-current

      - name: Commit and push marketplace-no-mcp
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          committed=false
          pushed=false
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: sync marketplace-no-mcp from main"
            committed=true
          fi
          ahead_count=$(git rev-list --count origin/marketplace-no-mcp..HEAD)
          if [ "$ahead_count" = "0" ]; then
            echo "marketplace-no-mcp already up to date"
            {
              echo "ahead_count=$ahead_count"
              echo "committed=$committed"
              echo "pushed=$pushed"
              echo "new_no_mcp_sha=$(git rev-parse HEAD)"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:marketplace-no-mcp
          pushed=true
          {
            echo "ahead_count=$ahead_count"
            echo "committed=$committed"
            echo "pushed=$pushed"
            echo "new_no_mcp_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Verify pushed no-MCP drift
        run: |
          git fetch origin main marketplace-no-mcp
          plugins/scripts/check-no-mcp-drift --compare-ref

      - name: Write sync summary
        if: always()
        env:
          MAIN_SHA: ${{ steps.merge.outputs.main_sha }}
          OLD_NO_MCP_SHA: ${{ steps.merge.outputs.old_no_mcp_sha }}
          MERGED_SHA: ${{ steps.merge.outputs.merged_sha }}
          NEW_NO_MCP_SHA: ${{ steps.push.outputs.new_no_mcp_sha }}
          AHEAD_COUNT: ${{ steps.push.outputs.ahead_count }}
          COMMITTED: ${{ steps.push.outputs.committed }}
          PUSHED: ${{ steps.push.outputs.pushed }}
        run: |
          {
            echo "## marketplace-no-mcp sync"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| main sha | \`${MAIN_SHA}\` |"
            echo "| old no-MCP sha | \`${OLD_NO_MCP_SHA}\` |"
            echo "| merged sha | \`${MERGED_SHA}\` |"
            echo "| new no-MCP sha | \`${NEW_NO_MCP_SHA}\` |"
            echo "| ahead commits before push | \`${AHEAD_COUNT}\` |"
            echo "| committed generated changes | \`${COMMITTED}\` |"
            echo "| pushed branch | \`${PUSHED}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
