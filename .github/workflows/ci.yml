name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: '23 9 * * 1'
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # .cargo/config.toml sets rustc-wrapper = "scripts/cargo-rustc-wrapper" for
  # local dev (sccache delegation + labby binary sync). The wrapper is a shell
  # script: Windows runners cannot exec it (os error 193) and its side effects
  # are pointless in CI, so clear ambient wrappers and override Cargo's
  # build.rustc-wrapper for all jobs.
  RUSTC_WRAPPER: ""
  CARGO_BUILD_RUSTC_WRAPPER: ""

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.classify.outputs.all }}
      docs: ${{ steps.classify.outputs.docs }}
      docs_check: ${{ steps.classify.outputs.docs_check }}
      workflow: ${{ steps.classify.outputs.workflow }}
      rust_compile: ${{ steps.classify.outputs.rust_compile }}
      rust_test: ${{ steps.classify.outputs.rust_test }}
      web: ${{ steps.classify.outputs.web }}
      docker: ${{ steps.classify.outputs.docker }}
      security: ${{ steps.classify.outputs.security }}
      release: ${{ steps.classify.outputs.release }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Prepare trusted changed path classifier
        run: |
          set -euo pipefail
          classifier="scripts/ci/changed_paths.py"
          trusted="/tmp/lab-changed-paths.py"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if ! git show "${{ github.event.pull_request.base.sha }}:$classifier" > "$trusted" 2>/dev/null; then
              cat > "$trusted" <<'PY'
          #!/usr/bin/env python3
          import argparse
          from pathlib import Path
          keys = "all docs docs_check workflow rust_compile rust_test web docker security release".split()
          parser = argparse.ArgumentParser()
          parser.add_argument("--event", required=True)
          parser.add_argument("--output", type=Path, required=True)
          parser.add_argument("--write-changed-files", type=Path)
          args, _ = parser.parse_known_args()
          if args.write_changed_files:
              args.write_changed_files.write_text("")
          args.output.write_text("".join(f"{key}=true\n" for key in keys))
          for key in keys:
              print(f"{key}=true")
          PY
            fi
          else
            cp "$classifier" "$trusted"
          fi
          chmod +x "$trusted"
          echo "LAB_CHANGED_PATHS=$trusted" >> "$GITHUB_ENV"
      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: python3 "$LAB_CHANGED_PATHS" --event "$EVENT_NAME" --output "$GITHUB_OUTPUT" --write-changed-files changed-files.txt

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: "true"

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.workflow == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go run github.com/rhysd/actionlint/cmd/actionlint@latest

  frontend-assets:
    name: Frontend assets
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.rust_compile == 'true' ||
        needs.changes.outputs.docs_check == 'true' ||
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.release == 'true'
      }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-gateway-admin
      - name: Upload gateway-admin export
        uses: actions/upload-artifact@v4
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out/
          if-no-files-found: error
          retention-days: 1

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust_compile == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.security == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: [changes, frontend-assets]
    if: ${{ needs.changes.outputs.rust_compile == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features --locked

  feature-slices:
    name: Feature slice (${{ matrix.slice }})
    runs-on: ubuntu-latest
    needs: [changes, frontend-assets]
    if: ${{ needs.changes.outputs.rust_compile == 'true' }}
    # CLAUDE.md's intent is that each standalone product slice compiles on its
    # own (--no-default-features --features <slice>) to catch cross-slice
    # coupling — a shared module referencing a feature-gated one unconditionally.
    # This is a hard gate on COMPILATION (errors), not warning-cleanliness:
    # per-slice dead-code warnings are an inherent, expected consequence of
    # disabling features (a service module is compiled but its registration is
    # gated off), so this job overrides the global `-D warnings`. The
    # all-features `check`/`clippy`/`test` jobs above remain the authoritative
    # warning-clean signal. `stash` has no feature flag (always-on) so it is
    # absent.
    env:
      RUSTFLAGS: ""
    strategy:
      fail-fast: false
      matrix:
        slice: [gateway, marketplace, fs, deploy, acp_registry]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p labby --no-default-features --features ${{ matrix.slice }} --all-targets --locked

  extracted-crate-slices:
    name: Extracted crate slice (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust_compile == 'true' }}
    env:
      RUSTFLAGS: ""
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: labby-auth-minimal
            command: cargo check -p labby-auth --no-default-features --all-targets --locked
          - name: labby-auth-http-axum
            command: cargo check -p labby-auth --no-default-features --features http-axum --all-targets --locked
          - name: labby-auth-upstream-oauth-rmcp
            command: cargo check -p labby-auth --no-default-features --features upstream-oauth-rmcp --all-targets --locked
          - name: labby-auth-all-runtime-features
            command: cargo check -p labby-auth --no-default-features --features http-axum,upstream-oauth-rmcp --all-targets --locked
          - name: labby-codemode
            command: cargo check -p labby-codemode --all-targets --locked
          - name: labby-gateway
            command: cargo check -p labby-gateway --all-targets --locked
          - name: labby-runtime-minimal
            command: cargo check -p labby-runtime --no-default-features --all-targets --locked
          - name: labby-runtime-marketplace
            command: cargo check -p labby-runtime --no-default-features --features marketplace --all-targets --locked
          - name: labby-runtime-acp-registry
            command: cargo check -p labby-runtime --no-default-features --features acp_registry --all-targets --locked
          - name: labby-runtime-deploy
            command: cargo check -p labby-runtime --no-default-features --features deploy --all-targets --locked
          - name: labby-runtime-all-features
            command: cargo check -p labby-runtime --no-default-features --features marketplace,acp_registry,deploy --all-targets --locked
          - name: labby-web
            command: cargo check -p labby-web --all-targets --locked
          - name: labby-winjob
            command: cargo check -p labby-winjob --all-targets --locked
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: ${{ matrix.command }}

  docs-check:
    name: Generated docs
    runs-on: ubuntu-latest
    needs: [changes, frontend-assets]
    if: ${{ needs.changes.outputs.docs_check == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just docs-check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [changes, frontend-assets]
    if: ${{ needs.changes.outputs.rust_compile == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --locked -- -D warnings

  test:
    name: Test
    # Self-hosted Linux runner on a PUBLIC repo: fork PRs must NEVER reach it.
    # Run on self-hosted for trusted events and same-repo PRs only.
    # Fork PRs are routed to `test-fork` on github-hosted Ubuntu.
    runs-on: [self-hosted, linux-lab]
    if: >-
      needs.changes.outputs.rust_test == 'true' &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    needs: [changes, frontend-assets]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features --locked --profile ci
      - name: Upload nextest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 14

  test-fork:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes, frontend-assets]
    if: >-
      needs.changes.outputs.rust_test == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features --locked --profile ci
      - name: Upload nextest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 14

  test-windows:
    name: Test (windows self-hosted)
    runs-on: [self-hosted, windows-lab]
    needs: [changes, frontend-assets]
    # Self-hosted runner on a PUBLIC repo: fork PRs must NEVER reach it.
    # Run for pushes/schedule/dispatch, and for same-repo pull requests only
    # (head repo == base repo). Fork PRs (head.repo.full_name != repo) are
    # skipped, so untrusted code can't execute on the runner — while our own
    # branch PRs (e.g. Windows reaping work) get pre-merge Windows verification.
    #
    # The runner is steamy's Windows host with rustup, NASM, CMake, and
    # LLVM/libclang preinstalled and a persistent warm target dir — no
    # toolchain/cache actions needed.
    if: >-
      needs.changes.outputs.rust_test == 'true' &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    timeout-minutes: 120
    env:
      CARGO_TARGET_DIR: C:\Users\jmaga\actions-runner\labby\_cargo-target\labby
      SCCACHE_DIR: C:\Users\jmaga\actions-runner\labby\_sccache\labby
      SCCACHE_CACHE_SIZE: 20G
      LAB_SCCACHE_EXE: C:\Users\jmaga\.cargo\bin\sccache.exe
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      RUSTC_WRAPPER: C:\Users\jmaga\.cargo\bin\sccache.exe
      CARGO_BUILD_RUSTC_WRAPPER: C:\Users\jmaga\.cargo\bin\sccache.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - name: Prune persistent Windows build caches
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $targetDir = $env:CARGO_TARGET_DIR
          $sccacheDir = $env:SCCACHE_DIR
          $targetMaxBytes = 50GB
          $sccacheMaxBytes = 20GB
          $maxAgeDays = 14

          function Get-TreeSizeBytes($Path) {
            if (-not (Test-Path $Path)) {
              return 0
            }
            $sum = Get-ChildItem -LiteralPath $Path -Recurse -Force -File -ErrorAction SilentlyContinue |
              Measure-Object -Property Length -Sum
            if ($null -eq $sum.Sum) {
              return 0
            }
            return [int64]$sum.Sum
          }

          function Remove-IfExists($Path) {
            if (Test-Path $Path) {
              Remove-Item -LiteralPath $Path -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

          function Prune-ByAge($Path, $MaxAgeDays) {
            if (-not (Test-Path $Path)) {
              return
            }
            $cutoff = (Get-Date).AddDays(-$MaxAgeDays)
            Get-ChildItem -LiteralPath $Path -Recurse -Force -File -ErrorAction SilentlyContinue |
              Where-Object { $_.LastWriteTime -lt $cutoff } |
              Remove-Item -Force -ErrorAction SilentlyContinue

            Get-ChildItem -LiteralPath $Path -Recurse -Force -Directory -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Where-Object { -not (Get-ChildItem -LiteralPath $_.FullName -Force -ErrorAction SilentlyContinue) } |
              Remove-Item -Force -ErrorAction SilentlyContinue
          }

          function Enforce-HardCap($Path, $MaxBytes, $Label) {
            $size = Get-TreeSizeBytes $Path
            if ($size -gt $MaxBytes) {
              Write-Warning "$Label is $([math]::Round($size / 1GB, 2)) GiB, above $([math]::Round($MaxBytes / 1GB, 2)) GiB; wiping it to enforce the hard cap."
              Remove-Item -LiteralPath $Path -Recurse -Force -ErrorAction SilentlyContinue
              New-Item -ItemType Directory -Force -Path $Path | Out-Null
              $size = Get-TreeSizeBytes $Path
            }
            Write-Host "$Label ready at $Path ($([math]::Round($size / 1GB, 2)) GiB, hard cap $([math]::Round($MaxBytes / 1GB, 2)) GiB)."
          }

          function Remove-TargetBuildDirs($TargetDir, $Patterns) {
            $buildDir = Join-Path $TargetDir "debug\build"
            if (-not (Test-Path $buildDir)) {
              return
            }
            foreach ($pattern in $Patterns) {
              Get-ChildItem -LiteralPath $buildDir -Directory -Filter $pattern -ErrorAction SilentlyContinue |
                Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          New-Item -ItemType Directory -Force -Path $sccacheDir | Out-Null

          # Native bindgen outputs can be left half-written by interrupted runs,
          # and Cargo may then reuse the stale build dir until the include! fails.
          Remove-TargetBuildDirs $targetDir @("libsqlite3-sys-*")

          Prune-ByAge $targetDir $maxAgeDays
          Prune-ByAge $sccacheDir $maxAgeDays

          $size = Get-TreeSizeBytes $targetDir
          if ($size -gt $targetMaxBytes) {
            Write-Warning "Persistent Cargo target dir is $([math]::Round($size / 1GB, 2)) GiB, above $([math]::Round($targetMaxBytes / 1GB, 2)) GiB; pruning volatile caches."
            Remove-IfExists (Join-Path $targetDir "debug\incremental")
            Remove-IfExists (Join-Path $targetDir "debug\.fingerprint")
            Remove-IfExists (Join-Path $targetDir "debug\deps")
          }

          Enforce-HardCap $targetDir $targetMaxBytes "Persistent Cargo target dir"
          Enforce-HardCap $sccacheDir $sccacheMaxBytes "Persistent sccache dir"
      - name: Install sccache
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "0.16.0"
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $sccacheExe = Join-Path $cargoBin "sccache.exe"
          $current = $null
          if (Test-Path $sccacheExe) {
            try {
              $current = (& $sccacheExe --version 2>$null)
            } catch {
              $current = $null
            }
          }
          if ($current -like "*$version*") {
            Write-Host "sccache already installed: $current"
            $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            exit 0
          }

          $target = "x86_64-pc-windows-msvc"
          $base = "https://github.com/mozilla/sccache/releases/download/v$version"
          $archive = Join-Path $env:RUNNER_TEMP "sccache.tar.gz"
          $shaFile = Join-Path $env:RUNNER_TEMP "sccache.sha256"
          $extractDir = Join-Path $env:RUNNER_TEMP "sccache"

          Invoke-WebRequest "$base/sccache-v$version-$target.tar.gz" -OutFile $archive
          Invoke-WebRequest "$base/sccache-v$version-$target.tar.gz.sha256" -OutFile $shaFile

          $expected = ((Get-Content $shaFile -Raw) -split "\s+")[0].Trim().ToLowerInvariant()
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "sccache checksum mismatch: expected $expected, got $actual"
          }

          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar -xzf $archive -C $extractDir
          $exe = Get-ChildItem -Path $extractDir -Recurse -Filter sccache.exe | Select-Object -First 1
          if (-not $exe) {
            throw "sccache.exe not found in release archive"
          }

          New-Item -ItemType Directory -Force -Path $cargoBin | Out-Null
          Copy-Item $exe.FullName $sccacheExe -Force
          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $sccacheExe --version
      - name: Install cargo-nextest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "0.9.138"
          $current = $null
          try {
            $current = (& cargo nextest --version 2>$null)
          } catch {
            $current = $null
          }
          if ($current -like "*$version*") {
            Write-Host "cargo-nextest already installed: $current"
            exit 0
          }

          $target = "x86_64-pc-windows-msvc"
          $base = "https://github.com/nextest-rs/nextest/releases/download/cargo-nextest-$version"
          $archive = Join-Path $env:RUNNER_TEMP "cargo-nextest.tar.gz"
          $shaFile = Join-Path $env:RUNNER_TEMP "cargo-nextest.sha256"
          $extractDir = Join-Path $env:RUNNER_TEMP "cargo-nextest"
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"

          Invoke-WebRequest "$base/cargo-nextest-$version-$target.tar.gz" -OutFile $archive
          Invoke-WebRequest "$base/cargo-nextest-$version-$target.sha256" -OutFile $shaFile

          $expected = (Get-Content $shaFile -Raw).Split(" ")[0].Trim().ToLowerInvariant()
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "cargo-nextest checksum mismatch: expected $expected, got $actual"
          }

          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar -xzf $archive -C $extractDir
          $exe = Get-ChildItem -Path $extractDir -Recurse -Filter cargo-nextest.exe | Select-Object -First 1
          if (-not $exe) {
            throw "cargo-nextest.exe not found in release archive"
          }

          New-Item -ItemType Directory -Force -Path $cargoBin | Out-Null
          Copy-Item $exe.FullName (Join-Path $cargoBin "cargo-nextest.exe") -Force
          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $cargoBin "cargo-nextest.exe") --version
      - name: Check Windows Job Object helper crate
        shell: pwsh
        run: cargo check -p labby-winjob --all-targets --locked
      - name: Run cargo nextest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("nextest", "run", "--workspace", "--all-features", "--locked", "--profile", "ci") `
            -NoNewWindow `
            -PassThru

          while (-not $process.WaitForExit(5000)) {
            Write-Host "Windows nextest still running at $(Get-Date -Format o)"
          }

          exit $process.ExitCode
      - name: Run Windows Job Object reaping integration test
        shell: pwsh
        run: cargo nextest run -p labby --test windows_job_object_reaping --all-features --locked --profile ci --run-ignored ignored-only --no-tests pass
      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: |
          if (Test-Path $env:LAB_SCCACHE_EXE) {
            & $env:LAB_SCCACHE_EXE --show-stats
          } else {
            Write-Warning "sccache.exe was not installed at $env:LAB_SCCACHE_EXE"
          }
      - name: Enforce Windows build cache caps
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $targetDir = $env:CARGO_TARGET_DIR
          $sccacheDir = $env:SCCACHE_DIR
          $targetMaxBytes = 50GB
          $sccacheMaxBytes = 20GB

          function Get-TreeSizeBytes($Path) {
            if (-not (Test-Path $Path)) {
              return 0
            }
            $sum = Get-ChildItem -LiteralPath $Path -Recurse -Force -File -ErrorAction SilentlyContinue |
              Measure-Object -Property Length -Sum
            if ($null -eq $sum.Sum) {
              return 0
            }
            return [int64]$sum.Sum
          }

          function Enforce-HardCap($Path, $MaxBytes, $Label) {
            New-Item -ItemType Directory -Force -Path $Path | Out-Null
            $size = Get-TreeSizeBytes $Path
            if ($size -gt $MaxBytes) {
              Write-Warning "$Label grew to $([math]::Round($size / 1GB, 2)) GiB, above $([math]::Round($MaxBytes / 1GB, 2)) GiB; wiping it to enforce the hard cap."
              Remove-Item -LiteralPath $Path -Recurse -Force -ErrorAction SilentlyContinue
              New-Item -ItemType Directory -Force -Path $Path | Out-Null
              $size = Get-TreeSizeBytes $Path
            }
            Write-Host "$Label final size: $([math]::Round($size / 1GB, 2)) GiB (hard cap $([math]::Round($MaxBytes / 1GB, 2)) GiB)."
          }

          Enforce-HardCap $targetDir $targetMaxBytes "Persistent Cargo target dir"
          Enforce-HardCap $sccacheDir $sccacheMaxBytes "Persistent sccache dir"

  release-smoke:
    name: Release smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes, frontend-assets]
    if: ${{ needs.changes.outputs.release == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest release builds take 20-25 min on GitHub-hosted
        # runners and a Linux cross-check is not viable (aws-lc-sys needs a
        # real Windows C toolchain even under `cargo check`). Skip Windows on
        # PRs; it still runs on every push to main, the weekly schedule, and
        # release.yml — so Windows breakage surfaces minutes after merge
        # instead of blocking every PR.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: true
      - run: cargo build --workspace --all-features --locked --release
      - name: Verify release binary
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          test -x target/release/labby
          target/release/labby --help >/dev/null
      - name: Verify release binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path target/release/labby.exe)) {
            throw "target/release/labby.exe was not built"
          }
          target/release/labby.exe --help | Out-Null

  container:
    name: Container build + smoke
    runs-on: ubuntu-latest
    needs: [changes, frontend-assets]
    if: ${{ needs.changes.outputs.docker == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gateway-admin-out
          path: apps/gateway-admin/out
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: config/Dockerfile
          push: false
          tags: lab:ci
          load: true

      - name: Run container and verify /health
        run: |
          set -euo pipefail
          docker run -d --name lab-ci-smoke \
            -p 18765:8765 \
            -e LAB_MCP_HTTP_HOST=0.0.0.0 \
            -e LAB_MCP_HTTP_PORT=8765 \
            -e LAB_MCP_HTTP_TOKEN=ci-smoke-token \
            lab:ci
          echo "Container started — polling http://localhost:18765/health (60s timeout)..."
          deadline=$(( $(date +%s) + 60 ))
          until curl -sf http://localhost:18765/health >/dev/null 2>&1; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: /health did not return 200 within 60s" >&2
              exit 1
            fi
            sleep 3
          done
          echo "/health OK"
          # The marketplace update/fork flow shells out to `git` — assert the
          # runtime image actually ships it, or that feature is dead in prod.
          docker exec lab-ci-smoke git --version
          echo "git present OK"

      - name: Dump container logs
        if: always()
        run: docker logs lab-ci-smoke 2>&1 || true

      - name: Stop and remove container
        if: always()
        run: |
          docker stop  lab-ci-smoke 2>/dev/null || true
          docker rm -f lab-ci-smoke 2>/dev/null || true

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - secret-scan
      - actionlint
      - frontend-assets
      - fmt
      - deny
      - check
      - feature-slices
      - extracted-crate-slices
      - docs-check
      - clippy
      - test
      - test-fork
      - test-windows
      - release-smoke
      - container
    steps:
      - name: verify required jobs passed or were intentionally skipped
        run: |
          set -euo pipefail
          require_success_or_skipped() {
            local name="$1"
            local result="$2"
            case "$result" in
              success|skipped) printf '%s=%s\n' "$name" "$result" ;;
              *) echo "::error::$name concluded $result" >&2; exit 1 ;;
            esac
          }
          require_success_or_skipped changes "${{ needs.changes.result }}"
          require_success_or_skipped secret-scan "${{ needs.secret-scan.result }}"
          require_success_or_skipped actionlint "${{ needs.actionlint.result }}"
          require_success_or_skipped frontend-assets "${{ needs.frontend-assets.result }}"
          require_success_or_skipped fmt "${{ needs.fmt.result }}"
          require_success_or_skipped deny "${{ needs.deny.result }}"
          require_success_or_skipped check "${{ needs.check.result }}"
          require_success_or_skipped feature-slices "${{ needs.feature-slices.result }}"
          require_success_or_skipped extracted-crate-slices "${{ needs.extracted-crate-slices.result }}"
          require_success_or_skipped docs-check "${{ needs.docs-check.result }}"
          require_success_or_skipped clippy "${{ needs.clippy.result }}"
          require_success_or_skipped test "${{ needs.test.result }}"
          require_success_or_skipped test-fork "${{ needs.test-fork.result }}"
          require_success_or_skipped test-windows "${{ needs.test-windows.result }}"
          require_success_or_skipped release-smoke "${{ needs.release-smoke.result }}"
          require_success_or_skipped container "${{ needs.container.result }}"
