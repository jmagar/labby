[advisories]
unmaintained = "all"
yanked = "deny"
ignore = [
    # rand: unsound when log+thread_rng features are used with a custom logger (no patch yet)
    "RUSTSEC-2026-0097",
    # rsa/rsa-der-parser: timing side-channel in RSA (no patch available upstream)
    "RUSTSEC-2023-0071",
    # webpki: URI name constraints ignored (no API impact for our usage)
    "RUSTSEC-2026-0098",
    # webpki: wildcard name constraint bypass (no API impact for our usage)
    "RUSTSEC-2026-0099",
    # backoff: unmaintained transitive dependency from rust_socketio 0.6.0
    "RUSTSEC-2025-0012",
    # instant: unmaintained transitive dependency from rust_socketio -> backoff
    "RUSTSEC-2024-0384",
    # rustls-pemfile: unmaintained transitive dependency from neo4rs 0.9.0-rc.9
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Convention enforcement — codifies rules from /CLAUDE.md and
# crates/lab-apis/CLAUDE.md that clippy can't enforce on its own.
# `wrappers` whitelists *direct* dep-graph parents allowed to pull the
# banned crate in. Any other crate in the workspace doing so fails.
#
# Note: `async-trait` is *not* banned here because `rmcp` pulls it in
# transitively. Writing `#[async_trait]` in our own code is forbidden
# via `clippy::disallowed_macros` instead — see clippy.toml at the
# workspace root.

[[bans.deny]]
name = "clap"
wrappers = ["labby", "clap_complete"]
reason = "Binary-only: lab-apis must stay pure. CLI parsing lives in `labby`."

[[bans.deny]]
name = "rmcp"
wrappers = ["labby", "agent-client-protocol"]
reason = "Binary-only: lab-apis must stay pure. MCP server lives in `labby`."

[[bans.deny]]
name = "anyhow"
wrappers = ["labby", "agent-client-protocol", "agent-client-protocol-schema"]
reason = "lab-apis uses `thiserror`. anyhow is for the binary only."

[[bans.deny]]
name = "tabled"
wrappers = ["labby"]
reason = "Binary-only: table formatting happens in `lab/src/output.rs`, not lab-apis."

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
