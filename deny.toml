[advisories]
unmaintained = "all"
yanked = "deny"
ignore = [
    # rand: unsound when log+thread_rng features are used with a custom logger (no patch yet)
    { id = "RUSTSEC-2026-0097", reason = "rand: no patch available upstream yet" },
    # rsa/rsa-der-parser: RSA timing side-channel — review if an upstream patch becomes available
    { id = "RUSTSEC-2023-0071", reason = "RSA timing side-channel; no upstream patch yet - review when rsa crate ships a fix" },
    # webpki: URI name constraints ignored (no API impact for our usage)
    { id = "RUSTSEC-2026-0098", reason = "webpki: no API impact for our usage" },
    # webpki: wildcard name constraint bypass (no API impact for our usage)
    { id = "RUSTSEC-2026-0099", reason = "webpki: no API impact for our usage" },
    # backoff: unmaintained transitive dependency from rust_socketio 0.6.0
    { id = "RUSTSEC-2025-0012", reason = "backoff: unmaintained transitive dep from rust_socketio 0.6.0" },
    # instant: unmaintained transitive dependency from rust_socketio -> backoff
    { id = "RUSTSEC-2024-0384", reason = "instant: unmaintained transitive dep from rust_socketio -> backoff" },
    # rustls-pemfile: unmaintained transitive dependency from neo4rs 0.9.0-rc.9
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: unmaintained transitive dep from neo4rs 0.9.0-rc.9" },
    # paste: unmaintained transitive macro dependency from boa_engine 0.21.1.
    # Code Mode runs Boa in a short-lived child process with no ambient host APIs.
    { id = "RUSTSEC-2024-0436", reason = "paste: unmaintained transitive dep from boa_engine 0.21.1; Code Mode uses Boa in isolated subprocess" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Convention enforcement — codifies rules from /CLAUDE.md and
# crates/lab-apis/CLAUDE.md that clippy can't enforce on its own.
# `wrappers` whitelists *direct* dep-graph parents allowed to pull the
# banned crate in. Any other crate in the workspace doing so fails.
#
# Note: `async-trait` is *not* banned here because `rmcp` pulls it in
# transitively. Writing `#[async_trait]` in our own code is forbidden
# via `clippy::disallowed_macros` instead — see clippy.toml at the
# workspace root.

[[bans.deny]]
name = "clap"
wrappers = ["labby", "clap_complete"]
reason = "Binary-only: lab-apis must stay pure. CLI parsing lives in `labby`."

[[bans.deny]]
name = "rmcp"
wrappers = ["labby", "agent-client-protocol"]
reason = "Binary-only: lab-apis must stay pure. MCP server lives in `labby`."

[[bans.deny]]
name = "anyhow"
wrappers = [
    "labby",
    "agent-client-protocol",
    "agent-client-protocol-schema",
    "javy",
    "wasmprinter",
    "wasmtime-environ",
]
reason = "lab-apis uses `thiserror`. anyhow is for the binary only."

[[bans.deny]]
name = "tabled"
reason = "Binary-only: table formatting happens in `lab/src/output.rs`, not lab-apis."

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
