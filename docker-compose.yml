services:
  labby-master:
    container_name: labby
    image: labby:dev
    build:
      context: .
      dockerfile: config/Dockerfile.fast
    restart: unless-stopped
    # Run Docker's tiny init as PID 1 so provider grandchildren orphaned by
    # launch wrappers such as npx are reaped after Lab terminates the process group.
    init: true
    working_dir: /workspace/lab

    ports:
      # LAB_HOST_PORT lets you remap the host-side port without editing this file.
      - "${LAB_HOST_PORT:-8765}:8765"

    volumes:
      # Bind-mount the host ~/.lab directory so every file the binary writes
      # there (auth.db, acp.db, registry.db, stash/, node-enrollments.json,
      # node-token, auth-jwt.pem) persists across container restarts and
      # image rebuilds without needing per-path env var overrides.
      - ${HOME}/.lab:/home/lab/.lab
      # Named volume for the log DB only — it is redirected to ~/.local via
      # LAB_LOCAL_LOGS_STORE_PATH and is ephemeral (TTL-pruned), so keeping
      # it off the host .lab directory avoids churn in host storage.
      - labby-data:/home/lab/.local
      # Host config file — also visible via the .lab bind mount above, but
      # the explicit :ro mount here makes the intent clear.
      - ${HOME}/.lab/config.toml:/home/lab/.config/lab/config.toml:ro
      # Host identity used for controller/node role resolution. Without this,
      # Docker's container ID hostname would be mistaken for the machine name.
      - /etc/hostname:/run/host/hostname:ro
      # Docker-specific ACP provider file. Uses container-local paths for
      # provider commands; overrides whatever is in the host ~/.lab/. File-level
      # mount wins over the parent directory bind mount above.
      - ./config/acp-providers.docker.json:/home/lab/.lab/acp-providers.json
      # Claude credentials — sourced live from the host's ~/.claude/ so the
      # token the container uses stays in lockstep with whatever the host
      # `claude` CLI most recently refreshed. Without this the lab-stored copy
      # at ~/.lab/acp/claude-home/.credentials.json drifts as the host token
      # rotates and Anthropic eventually returns 401 on every Claude session.
      # File-level mount wins over the parent ~/.lab bind. Mounted rw because
      # claude-agent-sdk may rewrite the file on token refresh; that goes
      # straight back to the host source-of-truth.
      - ${HOME}/.claude/.credentials.json:/home/lab/.lab/acp/claude-home/.credentials.json
      # Marketplace catalog state. The marketplace API reads Claude's known
      # marketplaces, cached marketplace checkouts, and installed plugin index
      # from ~/.claude/plugins; without this mount the web UI only sees the
      # network-backed ACP/MCP registries.
      - ${HOME}/.claude/plugins:/home/lab/.claude/plugins
      # Claude stores absolute host paths in known_marketplaces.json. Mirror
      # those paths inside the container so source counts and local marketplace
      # entries resolve without rewriting the host-owned index.
      - ${HOME}/.claude/plugins:${HOME}/.claude/plugins
      # Codex marketplace catalog state. The Codex backend reads personal
      # catalog manifests from ~/.agents/plugins and installed/cache metadata
      # from ~/.codex.
      - ${HOME}/.agents/plugins:/home/lab/.agents/plugins:ro
      - ${HOME}/.codex/config.toml:/home/lab/.codex/config.toml:ro
      - ${HOME}/.codex/cache:/home/lab/.codex/cache:ro
      # Runtime MCP gateways imported from Codex can reference plugin
      # entrypoints by absolute host path. Mirror those paths for stdio
      # gateways such as Bitwarden.
      - ${HOME}/.codex/plugins:${HOME}/.codex/plugins:ro
      # Bitwarden MCP validates the host-managed BW_SESSION file and shells
      # out to the Bitwarden CLI before starting the pinned MCP package.
      - /run/user/1000/bitwarden-mcp:/run/user/1000/bitwarden-mcp:ro
      - ${HOME}/.config/Bitwarden CLI:/home/lab/.config/Bitwarden CLI
      - ${HOME}/.local/share/fnm/node-versions/v24.13.0/installation:${HOME}/.local/share/fnm/node-versions/v24.13.0/installation:ro
      - ${HOME}/.gemini:/home/lab/.gemini
      # Open Design's MCP daemon is a local workspace service referenced by
      # absolute path in Codex config.
      - ${HOME}/workspace/open-design:${HOME}/workspace/open-design
      - .:/workspace/lab
      - .:${HOME}/workspace/lab

    environment:
      # Bind to all container interfaces so the port mapping works.
      # The host-side port mapping (above) controls external exposure.
      LAB_MCP_HTTP_HOST: "0.0.0.0"
      LAB_MCP_HTTP_PORT: "8765"
      # Override host-only paths from ~/.lab/.env for the container filesystem.
      LAB_WEB_ASSETS_DIR: ""
      # Redirect the log DB into the named volume (ephemeral, TTL-pruned).
      # All other DBs default to ~/.lab/ which is now bind-mounted from host.
      LAB_LOCAL_LOGS_STORE_PATH: "/home/lab/.local/share/lab/logs.db"
      ACP_SESSION_CWD: "/workspace/lab"
      # ACP prompt idle timeout — how long the runtime waits for any ACP event
      # after the first assistant text chunk before declaring idle_completion.
      # 5s (default) is too short for multi-step tool chains on a Docker-mounted
      # volume; 30s gives tool executions room to complete before we cut off.
      LAB_ACP_PROMPT_IDLE_TIMEOUT_MS: "30000"
      # After an idle_completion-terminated turn, the drain window waits for
      # codex-acp's late StopReason before accepting the next prompt.  Cap at 15s
      # so a follow-up prompt doesn't stall for the 5-minute default.
      LAB_ACP_TURN_DRAIN_TIMEOUT_MS: "15000"
      # Structured log levels — RUST_LOG for tracing, LAB_LOG for app filter.
      RUST_LOG: "labby=info,warn"
      LAB_LOG: "info"
      # Docker pipes stderr as a non-TTY; force ANSI colors for docker compose logs -f.
      # LAB_LOG_COLOR forces ColorPolicy::Color in tracing's with_ansi().
      # CLICOLOR_FORCE forces console::colors_enabled() which the custom log formatter uses.
      LAB_LOG_COLOR: "force"
      CLICOLOR_FORCE: "1"

    # ── Hard outer boundary ──────────────────────────────────────────────────
    # Even if the spawn-guard logic in the binary fails, the container's pid
    # namespace + these limits prevent a fork-bomb from reaching the host.
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 200

volumes:
  labby-data:
    driver: local
