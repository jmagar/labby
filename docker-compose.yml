name: lab

# Local development stack. Reuses the production runtime definition, but runs a
# dev image with the locally built Lab binary and frontend assets bind-mounted.
#
# Normal Rust changes only need `just dev` or `just dev-debug` plus a container
# restart; image rebuilds are only needed when config/Dockerfile.fast or the
# pre-installed adapter/tooling set changes.

services:
  labby-master:
    extends:
      file: docker-compose.prod.yml
      service: labby-master
    image: labby:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile.fast
    volumes:
      # Hot-swap the locally built binary into the dev runtime.
      - ./bin/labby:/usr/local/bin/labby
      # Persist the npm/uv package caches across container recreates. stdio MCP
      # upstreams are launched via `npx -y <pkg>` / `uvx <pkg>`, which install
      # into these caches on first cold spawn. Without persistence the caches
      # live in the container's writable layer and are wiped on every recreate,
      # forcing a fresh concurrent re-download each boot — the window in which
      # the install race (see pool/spawn_lock.rs) corrupts a package. A named
      # volume makes the clean install permanent: every later spawn is a cache
      # hit, so the race never runs again.
      - npm-cache:/home/labby/.npm
      - uv-cache:/home/labby/.cache
      # adb client for the in-container claude-in-mobile MCP server. claude-in-mobile
      # talks to the host's adb SERVER (config.toml: ANDROID_ADB_SERVER_ADDRESS +
      # ANDROID_ADB_SERVER_PORT=5037), so it only needs a client binary on PATH to
      # enumerate host-booted emulators (emulator-5554). Point the address at the
      # `host.docker.internal` alias provided by extra_hosts below rather than a
      # hardcoded bridge IP — Docker resolves it to the current host gateway on any
      # network. The host adb server must listen on a non-loopback interface
      # (`ADB_SERVER_SOCKET=tcp:0.0.0.0:5037` / `adb -a` on the host).
      #
      # We bind-mount the HOST's adb (not an apt-installed one) so the client version
      # matches the host server's exactly — a mismatched client would kill+restart
      # the host adb server and drop its live emulator sessions.
      #
      # Opt-in: set ADB_PATH in the repo .env to the host's adb (e.g.
      # ${HOME}/Android/Sdk/platform-tools/adb). The default /dev/null is a real
      # device present on every host; without it, an unset ADB_PATH would leave
      # Docker to auto-create an empty directory at the (missing) source path and
      # shadow the adb binary with a directory.
      - ${ADB_PATH:-/dev/null}:/usr/local/bin/adb:ro
      # ssh client for zsnoop-mcp and other upstreams that need to reach fleet hosts.
      - /usr/bin/ssh:/usr/local/bin/ssh:ro
    # extra_hosts (host.docker.internal:host-gateway) is inherited from
    # docker-compose.prod.yml via `extends` above — see the comment there.
    environment:
      # Serve frontend assets from the bind-mounted workspace so `pnpm build`
      # changes are reflected immediately without a binary rebuild.
      LAB_WEB_ASSETS_DIR: "/workspace/lab/apps/gateway-admin/out"
      # Parallel upstream MCP server discovery. Default is 3; bump for fast warmup.
      LAB_UPSTREAM_DISCOVERY_CONCURRENCY: "16"

volumes:
  labby-data:
    driver: local
  npm-cache:
    driver: local
  uv-cache:
    driver: local

networks:
  # Compose creates and manages this network on first `up`. Override the name
  # via the DOCKER_NETWORK env var to attach to an existing bridge shared with
  # other compose stacks — Compose joins a pre-existing network of that name
  # without re-creating it. Host-local `.env` files can set DOCKER_NETWORK to
  # the shared bridge used on that machine.
  lab:
    name: ${DOCKER_NETWORK:-lab}
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
  axon:
    external: true
    name: ${AXON_DOCKER_NETWORK:-jakenet}
