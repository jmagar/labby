name: lab

# Local development stack. Builds Lab from this checkout and reuses the
# production runtime definition from docker-compose.prod.yml.
#
# Normal dev flow still layers docker-compose.dev.yml on top:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  labby-master:
    extends:
      file: docker-compose.prod.yml
      service: labby-master
    image: labby:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile.fast

volumes:
  labby-data:
    driver: local

networks:
  jakenet:
    name: jakenet
    external: true
