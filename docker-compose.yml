name: lab

# Local development stack. Reuses the production runtime definition, but runs a
# dev image with the locally built Lab binary and frontend assets bind-mounted.
#
# Normal Rust changes only need `just dev` or `just dev-debug` plus a container
# restart; image rebuilds are only needed when config/Dockerfile.fast or the
# pre-installed adapter/tooling set changes.

services:
  labby-master:
    extends:
      file: docker-compose.prod.yml
      service: labby-master
    image: labby:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile.fast
    volumes:
      # Hot-swap the locally built binary into the dev runtime.
      - ./bin/labby:/usr/local/bin/labby
    environment:
      # Serve frontend assets from the bind-mounted workspace so `pnpm build`
      # changes are reflected immediately without a binary rebuild.
      LAB_WEB_ASSETS_DIR: "/workspace/lab/apps/gateway-admin/out"

volumes:
  labby-data:
    driver: local

networks:
  # Compose creates and manages this network on first `up`. Override the name
  # via the DOCKER_NETWORK env var to attach to an existing bridge shared with
  # other compose stacks — Compose joins a pre-existing network of that name
  # without re-creating it. Host-local `.env` files can set DOCKER_NETWORK to
  # the shared bridge used on that machine.
  lab:
    name: ${DOCKER_NETWORK:-lab}
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
  axon:
    external: true
    name: ${AXON_DOCKER_NETWORK:-jakenet}
