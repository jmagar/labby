# Lab configuration — preferences only, no secrets.
#
# Copy to ~/.lab/config.toml and uncomment sections as needed.
# A ./config.toml in the working directory also works as a per-repo override.
#
# Docker: docker-compose.yml mounts ${HOME}/.lab/config.toml directly, so
# Docker and local `labby serve` share the same config.
#
# Secrets (API keys, tokens, passwords, URLs) belong in ~/.lab/.env.
# Everything else belongs here. All values below can still be overridden
# by environment variables — env always wins over config.toml.
#
# Config search order (first found wins):
#   1. ./config.toml              (repo/CWD override)
#   2. ~/.lab/config.toml         (user-level, next to .env)
#   3. ~/.config/lab/config.toml  (XDG-style fallback)
#
# Value precedence (highest wins):
#   1. CLI flags
#   2. Environment variables (including those loaded from ~/.lab/.env)
#   3. config.toml (from whichever location was found)
#   4. Built-in defaults

# ── Output ───────────────────────────────────────────────────────────────────

[output]
# Default output format for CLI commands: "human" or "json".
# Override per-command with --json.
# format = "human"                       # default: "human"

# ── Logging ──────────────────────────────────────────────────────────────────

[log]
# Tracing filter directive.
# Override with LAB_LOG env var.
# filter = "lab=info,lab_apis=warn"       # default: "lab=info,lab_apis=warn"

# Log output format: "text" or "json".
# Override with LAB_LOG_FORMAT env var.
# format = "text"                         # default: "text"

# ── MCP Server ───────────────────────────────────────────────────────────────

[mcp]
# Default transport: "stdio" or "http".
# Override with --transport or LAB_MCP_TRANSPORT.
# transport = "stdio"                     # default: "stdio"

# Bind address for the HTTP transport.
# Override with --host or LAB_MCP_HTTP_HOST.
# host = "127.0.0.1"                      # default: "127.0.0.1"

# Port for the HTTP transport.
# Override with --port or LAB_MCP_HTTP_PORT.
# port = 8765                             # default: 8765

# HTTP MCP session keep-alive TTL in seconds.
# Override with LAB_MCP_SESSION_TTL_SECS.
# session_ttl_secs = 300                  # default: 300

# Whether HTTP MCP uses stateful sessions.
# Override with LAB_MCP_STATEFUL.
# stateful = true                         # default: true

# Additional allowed hosts for DNS rebinding protection.
# Override with LAB_MCP_ALLOWED_HOSTS env var (comma-separated).
# allowed_hosts = []                      # default: []

# ── HTTP API ─────────────────────────────────────────────────────────────────

[api]
# Additional CORS origins beyond the built-in loopback defaults.
# Loopback origins (localhost, 127.0.0.1, [::1]) are always included.
# Override with LAB_CORS_ORIGINS env var (comma-separated).
# cors_origins = []                       # default: [] (loopback only)

# Example:
# cors_origins = [
#   "https://lab.example.com",
#   "http://192.168.1.100:3000",        # standalone Next dev server (development only)
# ]

# ── Web UI ───────────────────────────────────────────────────────────────────

[web]
# Path to the exported Labby assets directory served by `labby serve --transport http`.
# Override with LAB_WEB_ASSETS_DIR.
# If unset, `labby serve` auto-detects the repo-local fallback at apps/gateway-admin/out.
# assets_dir = "/srv/labby/out"

# Disable /v1/* auth for the hosted web UI. Only for trusted reverse-proxy setups.
# Override with LAB_WEB_UI_AUTH_DISABLED=true.
# disable_auth = false                    # default: false

# ── Workspace ────────────────────────────────────────────────────────────────

[workspace]
# Root directory for Lab-managed files (fs browsing, stash workspaces).
# No env var override — config-file only.
# root = "~/.lab/stash"                  # default: ~/.lab/stash

# ── MCP Registry ─────────────────────────────────────────────────────────────

[mcpregistry]
# Upstream MCP Registry base URL.
# url = "https://registry.modelcontextprotocol.io"   # default

# ── Node Runtime ─────────────────────────────────────────────────────────────

[node]
# Hostname or IP of the master lab instance this node should phone home to.
# Determines whether this device operates as master or non-master.
# No env var override — config-file only.
# controller = "http://dookie:8765"

# How many days to retain node logs in the SQLite store.
# log_retention_days = 30                # default: 30

# ── Local Log Store ───────────────────────────────────────────────────────────

[local_logs]
# Override with LAB_LOCAL_LOGS_STORE_PATH env var.
# store_path = "~/.lab/logs.db"

# Override with LAB_LOCAL_LOGS_RETENTION_DAYS env var.
# retention_days = 7                     # default: 7

# Override with LAB_LOCAL_LOGS_MAX_BYTES env var.
# max_bytes = 268435456                  # default: 256 MiB

# Override with LAB_LOCAL_LOGS_QUEUE_CAPACITY env var.
# queue_capacity = 1024                  # default: 1024

# Override with LAB_LOCAL_LOGS_SUBSCRIBER_CAPACITY env var.
# subscriber_capacity = 256              # default: 256

# ── Gateway Tool Search ──────────────────────────────────────────────────────

[tool_search]
# Gateway-wide mode. When enabled, proxied upstream tools are hidden from
# MCP list_tools and exposed through synthetic tool_search/tool_execute helpers.
# enabled = false                           # default: false
# top_k_default = 10                        # valid range: 1..=50
# max_tools = 5000                          # valid range: 1..=10000

# ── OAuth Relay Machines ─────────────────────────────────────────────────────

# Full callback base URL for a named remote OAuth listener.
# [oauth.machines.dookie]
# target_url = "http://100.88.16.79:38935/callback/dookie"
# description = "Dookie Claude callback target"
# default_port = 38935

# ── Auth ─────────────────────────────────────────────────────────────────────

[auth]
# HTTP auth mode: "bearer" or "oauth".
# Override with LAB_AUTH_MODE.
# mode = "bearer"                         # default: "bearer"

# Public URL used for OAuth metadata, callbacks, and JWT issuer/audience.
# Often kept in ~/.lab/.env alongside other URLs.
# Override with LAB_PUBLIC_URL.
# public_url = "https://lab.example.com"

# Optional path override for the auth SQLite database.
# Override with LAB_AUTH_SQLITE_PATH.
# sqlite_path = "/var/lib/lab/auth.db"    # default: ~/.lab/auth.db

# Optional path override for the JWT signing key.
# Override with LAB_AUTH_KEY_PATH.
# key_path = "/var/lib/lab/auth-jwt.pem"  # default: ~/.lab/auth-jwt.pem

# Google credentials are usually kept in ~/.lab/.env:
#   LAB_GOOGLE_CLIENT_ID
#   LAB_GOOGLE_CLIENT_SECRET

# Optional Google callback path override.
# Override with LAB_GOOGLE_CALLBACK_PATH.
# google_callback_path = "/auth/google/callback"

# Optional redirect URI patterns for non-loopback MCP OAuth callbacks.
# Override with LAB_AUTH_ALLOWED_REDIRECT_URIS.
# allowed_client_redirect_uris = ["https://callback.tootie.tv/callback/*"]

# Optional Google scopes override.
# Override with LAB_GOOGLE_SCOPES.
# google_scopes = ["openid", "email", "profile"]

# Optional token/code lifetime overrides (seconds).
# Override with LAB_AUTH_ACCESS_TOKEN_TTL_SECS / LAB_AUTH_REFRESH_TOKEN_TTL_SECS / LAB_AUTH_CODE_TTL_SECS.
# access_token_ttl_secs = 3600
# refresh_token_ttl_secs = 2592000
# auth_code_ttl_secs = 300

# ── Admin ────────────────────────────────────────────────────────────────────

[admin]
# Enable the lab_admin MCP tool (onboarding audit).
# Override with LAB_ADMIN_ENABLED=1 env var.
# enabled = false                         # default: false

# ── Per-Service Preferences ──────────────────────────────────────────────────
#
# Non-secret, non-URL settings for individual services.
# URLs and auth credentials still go in ~/.lab/.env.

[services.tailscale]
# Tailnet name for Tailscale API calls.
# Override with TAILSCALE_TAILNET env var.
# tailnet = "-"                           # default: "-" (auto-detect)

# ── Secrets (env-only) ───────────────────────────────────────────────────────
#
# These MUST be set via environment variables (in ~/.lab/.env), not here:
#
#   LAB_MCP_HTTP_TOKEN — bearer token for HTTP transport (required in bearer mode)
#   *_URL              — service base URLs
#   *_API_KEY          — service API keys
#   *_TOKEN            — service auth tokens
#   *_USERNAME         — service usernames
#   *_PASSWORD         — service passwords
